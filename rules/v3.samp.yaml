rules:
  - id: insecure-strcpy-usage
    languages:
      - c
      - cpp
    message: Avoid using strcpy; it can cause buffer overflows. Consider using strncpy or safer alternatives; v2;
    severity: WARNING
    pattern: strcpy($DEST, $SRC)

    metadata:
      category: security
      subcategory:
        - vuln
      likelihood: MEDIUM
      impact: HIGH
      confidence: HIGH
      technology:
        - c
        - cpp
