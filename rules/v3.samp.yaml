rules:
  - id: insecure-strcpy-usage
    tags:
      - v3.0
    languages:
      - c
      - cpp
    message: Avoid using strcpy; it can cause buffer overflows. Consider using strncpy or safer alternatives; v3;
    severity: WARNING
    pattern: strcpy($DEST, $SRC)

    metadata:
      labels:
        - v3
      category: security
      subcategory:
        - vuln
      likelihood: MEDIUM
      impact: HIGH
      confidence: HIGH
      technology:
        - c
        - cpp
